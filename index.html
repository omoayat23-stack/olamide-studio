<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Olamide Visuals | Cinematic Storytelling & Visual Excellence</title>
    
    <!-- Standard SEO Metadata -->
    <meta name="description" content="Olamide Visuals is a professional photography, and creative media brand specializing in cinematic storytelling, event coverage, creative content production, and visual excellence." />
    <meta name="keywords" content="photography, cinematic storytelling, event coverage, creative content, Olamide Visuals, professional photography" />
    <meta name="author" content="Olamide Visuals" />

    <!-- Open Graph / Facebook / WhatsApp / Instagram / Telegram -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Olamide Visuals | Cinematic Storytelling & Visual Excellence" />
    <meta property="og:description" content="Olamide Visuals is a professional photography, and creative media brand specializing in cinematic storytelling, event coverage, creative content production, and visual excellence." />
    <meta property="og:url" content="/" />
    <meta property="og:site_name" content="Olamide Visuals" />
    <meta property="og:image" content="/social_preview.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="675" />
    <meta property="og:image:type" content="image/jpeg" />

    <!-- X / Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Olamide Visuals | Cinematic Storytelling & Visual Excellence" />
    <meta name="twitter:description" content="Olamide Visuals is a professional photography, and creative media brand specializing in cinematic storytelling, event coverage, creative content production, and visual excellence." />
    <meta name="twitter:image" content="/social_preview.jpg" />

    <script>
      // Dynamically resolve and set absolute URLs for sharing metadata in browser-based scrapers
      if (typeof window !== 'undefined' && window.location) {
        document.addEventListener('DOMContentLoaded', () => {
          const origin = window.location.origin;
          const ogImage = document.querySelector('meta[property="og:image"]');
          if (ogImage) ogImage.setAttribute('content', origin + '/social_preview.jpg');
          const twitterImage = document.querySelector('meta[name="twitter:image"]');
          if (twitterImage) twitterImage.setAttribute('content', origin + '/social_preview.jpg');
          const ogUrl = document.querySelector('meta[property="og:url"]');
          if (ogUrl) ogUrl.setAttribute('content', window.location.href);
        });
      }

      // Safe, robust WebSocket override and log filter to gracefully handle Vite HMR WebSockets
      if (typeof window !== 'undefined') {
        // Intercept standard console.error and console.warn to suppress benign HMR socket logs
        const originalError = console.error;
        console.error = function(...args) {
          const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
          if (
            message.includes('websocket') ||
            message.includes('WebSocket') ||
            message.includes('HMR') ||
            message.includes('[vite]') ||
            message.includes('connection failed')
          ) {
            // Silently swallow development HMR websocket connection warnings
            return;
          }
          originalError.apply(console, args);
        };

        const originalWarn = console.warn;
        console.warn = function(...args) {
          const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
          if (
            message.includes('websocket') ||
            message.includes('WebSocket') ||
            message.includes('HMR') ||
            message.includes('[vite]')
          ) {
            return;
          }
          originalWarn.apply(console, args);
        };

        // Intercept WebSocket instantiation to prevent browser-level network connection failures
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          // Define a fallback mock/dummy WebSocket class
          class DummyWebSocket {
            constructor(url, protocols) {
              this.url = url;
              this.protocols = protocols;
              this.readyState = 3; // CLOSED status
              this.bufferedAmount = 0;
              this.extensions = '';
              this.protocol = '';
              this.binaryType = 'blob';
              
              // Event listeners holders
              this._listeners = {};

              console.log('[WebSocket Interceptor] Bypassed development HMR WebSocket connection:', url);
              
              // Gracefully fire connection close / error hooks if code expects them
              setTimeout(() => {
                if (typeof this.onclose === 'function') {
                  this.onclose(new CloseEvent('close', { wasClean: true, code: 1000, reason: 'HMR Bypassed' }));
                }
              }, 50);
            }

            send(data) {}
            close(code, reason) {}
            
            addEventListener(type, callback) {
              if (!this._listeners[type]) this._listeners[type] = [];
              this._listeners[type].push(callback);
            }

            removeEventListener(type, callback) {
              if (!this._listeners[type]) return;
              this._listeners[type] = this._listeners[type].filter(cb => cb !== callback);
            }
          }

          // Override global WebSocket constructor
          window.WebSocket = function(url, protocols) {
            // If it is HMR or local loopback connection, use our safe Dummy WebSocket
            if (
              url.includes('localhost') || 
              url.includes('127.0.0.1') || 
              url.includes('.run.app') || 
              url.includes('hmr') ||
              url.includes('/vite')
            ) {
              return new DummyWebSocket(url, protocols);
            }
            // For any other genuine third-party WebSockets, let them run normally
            return new OriginalWebSocket(url, protocols);
          };

          // Preserve prototype chain and static constants
          window.WebSocket.prototype = OriginalWebSocket.prototype;
          window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
          window.WebSocket.OPEN = OriginalWebSocket.OPEN;
          window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
          window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
        }

        // Global Event listeners for ultimate safety net
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && (
            event.reason.message === 'WebSocket closed without opened.' ||
            (typeof event.reason === 'string' && event.reason.includes('WebSocket')) ||
            (event.reason.message && event.reason.message.includes('websocket')) ||
            (event.reason.message && event.reason.message.includes('WebSocket'))
          )) {
            event.preventDefault();
          }
        });

        window.addEventListener('error', function(event) {
          if (event.message && (
            event.message.includes('websocket') || 
            event.message.includes('WebSocket') ||
            event.message.includes('HMR')
          )) {
            event.preventDefault();
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
