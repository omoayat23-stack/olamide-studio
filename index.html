<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Suppress expected and benign Vite HMR websocket connection errors in the sandboxed preview environment
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          event.reason.message === 'WebSocket closed without opened.' ||
          (typeof event.reason === 'string' && event.reason.includes('WebSocket')) ||
          (event.reason.message && event.reason.message.includes('websocket')) ||
          (event.reason.message && event.reason.message.includes('WebSocket'))
        )) {
          event.preventDefault();
        }
      });
      window.addEventListener('error', function(event) {
        if (event.message && (
          event.message.includes('websocket') || 
          event.message.includes('WebSocket') ||
          event.message.includes('HMR')
        )) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
